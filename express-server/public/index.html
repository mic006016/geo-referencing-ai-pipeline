<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Geo-AI 항공위성 객체 탐지 시스템</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 380px;
        background: #1e272e;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        overflow-y: auto;
      }
      #map {
        flex: 1;
        height: 100%;
        background: #000;
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
        border-bottom: 2px solid #485460;
        padding-bottom: 10px;
        color: #d2dae2;
      }
      .card {
        background: #485460;
        padding: 15px;
        border-radius: 6px;
      }
      .card h3 {
        margin-top: 0;
        color: #d2dae2;
        font-size: 1.1rem;
      }
      input[type="file"] {
        display: none;
      }
      .custom-file-upload {
        display: block;
        background: #d2dae2;
        color: #1e272e;
        text-align: center;
        padding: 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }
      .custom-file-upload:hover {
        background: #bcbcbc;
      }
      #upload-status {
        margin-top: 10px;
        font-size: 0.9rem;
        color: #d2dae2;
        white-space: pre-wrap;
      }
      #status-counts {
        font-size: 1.1rem;
        font-weight: bold;
        color: #ffd32a;
      }

      /* 범례(Legend) 스타일 */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.85rem;
      }
      .color-box {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>🛰️ Geo-AI 공간 매핑 센터</h1>

      <div class="card">
        <h3>📸 위성/항공 타일 객체 탐지 및 매핑</h3>
        <p style="font-size: 0.85rem; color: #d2dae2; line-height: 1.4">
          지도 화면 중심을 기준으로 타일 영역이 자동 설정됩니다.<br />
          원하는 위치로 지도를 이동한 뒤, 이미지를 업로드하세요.
        </p>
        <form id="upload-form">
          <label for="image-input" class="custom-file-upload"
            >📁 이미지 선택 및 비동기 분석</label
          >
          <input type="file" id="image-input" accept="image/*" multiple />
        </form>
        <div id="upload-status">대기 중...</div>
      </div>

      <div class="card">
        <h3>📊 공간 데이터 조회 현황</h3>
        <div id="status-counts">화면 내 탐지 객체: 0건</div>

        <div class="legend">
          <div class="legend-item">
            <div class="color-box" style="background: #ff3f34"></div>
            건물
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #0fbcf9"></div>
            도로
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #0be881"></div>
            논
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #ffd32a"></div>
            밭
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #d2dae2"></div>
            비닐하우스
          </div>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 1. 지도 초기화 (위성 지도 타일 사용)
      const map = L.map("map").setView([37.5665, 126.978], 15);

      // 구글 위성 지도(Vworld 등 대체 가능)로 배경 변경하여 리얼리티 극대화
      L.tileLayer("http://mt0.google.com/vt/lyrs=s&hl=kr&x={x}&y={y}&z={z}", {
        attribution: "© Google",
        maxZoom: 20,
      }).addTo(map);

      // 객체 타입별 색상 매핑 함수
      function getColorByType(type) {
        switch (type) {
          case "Building":
          case "건물":
            return "#ff3f34";
          case "Road":
          case "도로":
            return "#0fbcf9";
          case "RicePaddy":
          case "논":
            return "#0be881";
          case "Field":
          case "밭":
            return "#ffd32a";
          case "GreenHouse":
          case "비닐하우스":
            return "#d2dae2";
          default:
            return "#ffffff";
        }
      }

      // 2. AI가 탐지한 객체를 그릴 GeoJSON 레이어
      let geojsonLayer = L.geoJSON(null, {
        pointToLayer: function (feature, latlng) {
          const type =
            feature.properties.objectType || feature.properties.damageType;
          return L.circleMarker(latlng, {
            radius: 4,
            fillColor: getColorByType(type),
            color: "#000",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.9,
          });
        },
        onEachFeature: function (feature, layer) {
          const p = feature.properties;
          layer.bindPopup(`
            <div style="line-height: 1.4;">
              <b style="font-size: 1.1rem; color: #1e272e;">탐지 객체 정보</b><hr style="margin: 5px 0;">
              <b>분류:</b> <span style="color:${getColorByType(p.objectType)}">${p.objectType || "N/A"}</span><br>
              <b>AI 확신도:</b> ${p.confidence ? (p.confidence * 100).toFixed(1) + "%" : "-"}<br>
              <b>Task ID:</b> ${p.taskId ? p.taskId.substring(0, 8) + "..." : "-"}<br>
            </div>
          `);
        },
      }).addTo(map);

      // 3. 현재 화면 바운딩 박스 기준으로 DB 데이터 조회 (BBox 쿼리)
      function fetchMapData() {
        const bounds = map.getBounds();
        fetch(
          `/api/spatial/bbox?minLon=${bounds.getWest()}&minLat=${bounds.getSouth()}&maxLon=${bounds.getEast()}&maxLat=${bounds.getNorth()}`,
        )
          .then((res) => res.json())
          .then((geoJsonData) => {
            geojsonLayer.clearLayers();
            geojsonLayer.addData(geoJsonData);
            document.getElementById("status-counts").innerHTML =
              `화면 내 탐지 객체: <b>${geoJsonData.features ? geoJsonData.features.length : 0}</b>건`;
          })
          .catch((err) => console.error("데이터 로드 실패:", err));
      }

      map.on("moveend", fetchMapData);
      fetchMapData();

      // 4. 다중 이미지 업로드 및 공간 범위 시뮬레이션
      document
        .getElementById("image-input")
        .addEventListener("change", async function (e) {
          const files = e.target.files;
          if (files.length === 0) return;

          const statusDiv = document.getElementById("upload-status");
          statusDiv.innerHTML = `🚀 ${files.length}장 비동기 업로드 시작...`;
          statusDiv.style.color = "#ffd32a";

          // 데모 시각화를 위해 현재 지도 중심을 기준으로 가상의 Bounding Box 생성
          // (실제 프로덕션에서는 이미지와 함께 META.json 파일의 좌표를 파싱해서 보내야 함)
          const center = map.getCenter();
          const offset = 0.002; // 타일 하나의 대략적인 위경도 크기
          const mockBounds = {
            minLon: center.lng - offset,
            maxLon: center.lng + offset,
            minLat: center.lat - offset,
            maxLat: center.lat + offset,
          };

          let successCount = 0;

          // 여러 장의 파일을 비동기로 순차/병렬 전송
          for (let i = 0; i < files.length; i++) {
            const formData = new FormData();
            formData.append("image", files[i]);
            formData.append("minLon", mockBounds.minLon);
            formData.append("minLat", mockBounds.minLat);
            formData.append("maxLon", mockBounds.maxLon);
            formData.append("maxLat", mockBounds.maxLat);

            try {
              const res = await fetch("/api/images/upload", {
                method: "POST",
                body: formData,
              });
              const data = await res.json();

              if (data.success) {
                successCount++;

                // 1. 지도 위에 반투명 이미지 얹기
                const imageUrl = URL.createObjectURL(files[i]);
                const imageBounds = [
                  [mockBounds.minLat, mockBounds.minLon],
                  [mockBounds.maxLat, mockBounds.maxLon],
                ];
                L.imageOverlay(imageUrl, imageBounds, { opacity: 0.65 }).addTo(
                  map,
                );

                // 2. 업로드한 사진의 중심 위치로 지도 부드럽게 이동시키기
                const centerLat = (mockBounds.minLat + mockBounds.maxLat) / 2;
                const centerLon = (mockBounds.minLon + mockBounds.maxLon) / 2;

                // flyTo(중심좌표, 줌레벨, {옵션})를 쓰면 화면이 비행기 타듯 부드럽게 이동
                map.flyTo([centerLat, centerLon], 16, {
                  animate: true,
                  duration: 1.5,
                });
              }
            } catch (err) {
              console.error("업로드 에러:", err);
            }

            // UI 진행상황 업데이트
            statusDiv.innerHTML = `⏳ 처리 중... (${i + 1}/${files.length})`;
          }

          statusDiv.innerHTML = `✅ ${successCount}장 대기열 등록 완료!<br>AI 워커가 분석을 완료하면 지도에 마커가 표시됩니다.`;
          statusDiv.style.color = "#0be881";

          // AI 워커 연산 시간을 고려하여 2초 단위로 몇 번 새로고침(폴링)
          let refreshCount = 0;
          const interval = setInterval(() => {
            fetchMapData();
            refreshCount++;
            if (refreshCount > 5) clearInterval(interval); // 10초 후 폴링 종료
          }, 2000);
        });
    </script>
  </body>
</html>

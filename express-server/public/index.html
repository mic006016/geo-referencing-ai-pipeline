<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Geo-AI 항공위성 객체 탐지 시스템</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 380px;
        background: #1e272e;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        overflow-y: auto;
      }
      #map {
        flex: 1;
        height: 100%;
        background: #000;
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
        border-bottom: 2px solid #485460;
        padding-bottom: 10px;
        color: #d2dae2;
      }
      .card {
        background: #485460;
        padding: 15px;
        border-radius: 6px;
      }
      .card h3 {
        margin-top: 0;
        color: #d2dae2;
        font-size: 1.1rem;
      }
      input[type="file"] {
        display: none;
      }

      .custom-file-upload {
        display: block;
        background: #d2dae2;
        color: #1e272e;
        text-align: center;
        padding: 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
        border: none;
        width: 100%;
        box-sizing: border-box;
      }
      .custom-file-upload:hover {
        background: #bcbcbc;
      }
      .btn-submit {
        background: #0be881;
        color: #1e272e;
        margin-top: 10px;
      }
      .btn-submit:hover {
        background: #09c46e;
      }

      #upload-status {
        margin-top: 15px;
        font-size: 0.9rem;
        color: #d2dae2;
        white-space: pre-wrap;
        line-height: 1.4;
      }
      #status-counts {
        font-size: 1.1rem;
        font-weight: bold;
        color: #ffd32a;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.85rem;
      }
      .color-box {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.2);
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
  </head>
  <body>
    <div id="sidebar">
      <h1>🛰️ Geo-AI 공간 매핑 센터</h1>

      <div class="card">
        <h3>📸 위성 데이터 실제 좌표 매핑</h3>
        <p style="font-size: 0.85rem; color: #d2dae2; line-height: 1.4">
          이미지와 메타데이터(JSON)를 각각 선택한 후 전송을 누르면,
          <b>실제 촬영된 위치로 이동</b>하며 매핑됩니다.
        </p>

        <div style="display: flex; flex-direction: column; gap: 8px">
          <label for="image-input" class="custom-file-upload" id="label-image"
            >1. 🖼️ 위성 이미지 선택 (.jpg)</label
          >
          <input type="file" id="image-input" accept="image/*" />

          <label for="json-input" class="custom-file-upload" id="label-json"
            >2. 📄 메타데이터 선택 (.json)</label
          >
          <input type="file" id="json-input" accept=".json" />

          <button id="btn-submit" class="custom-file-upload btn-submit">
            🚀 매핑 및 분석 시작
          </button>
        </div>

        <div id="upload-status">대기 중...</div>
      </div>

      <div class="card">
        <h3>📊 공간 데이터 조회 현황</h3>
        <div id="status-counts">화면 내 탐지 객체: 0건</div>

        <div class="legend">
          <div class="legend-item">
            <div class="color-box" style="background: #ffb3ba"></div>
            건물
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #bae1ff"></div>
            도로
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #baffc9"></div>
            논
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #ffffba"></div>
            밭
          </div>
          <div class="legend-item">
            <div class="color-box" style="background: #e0bbe4"></div>
            비닐하우스
          </div>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 1. Proj4js 좌표계 정의 (EPSG:5186)
      proj4.defs(
        "EPSG:5186",
        "+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=600000 +ellps=GRS80 +units=m +no_defs",
      );

      // 2. 지도 초기화
      const map = L.map("map").setView([37.5665, 126.978], 10);
      L.tileLayer("http://mt0.google.com/vt/lyrs=s&hl=kr&x={x}&y={y}&z={z}", {
        attribution: "© Google",
        maxZoom: 20,
      }).addTo(map);

      // 💡 파스텔 톤 색상 매핑 함수
      function getColorByType(type) {
        switch (type) {
          case "Building":
          case "건물":
            return "#ffb3ba"; // 파스텔 레드/핑크
          case "Road":
          case "도로":
            return "#bae1ff"; // 파스텔 블루
          case "RicePaddy":
          case "논":
            return "#baffc9"; // 파스텔 그린
          case "Field":
          case "밭":
            return "#ffffba"; // 파스텔 옐로우
          case "GreenHouse":
          case "비닐하우스":
            return "#e0bbe4"; // 파스텔 퍼플
          default:
            return "#ffffff";
        }
      }

      // GeoJSON 레이어
      let geojsonLayer = L.geoJSON(null, {
        pointToLayer: function (feature, latlng) {
          const type =
            feature.properties.objectType || feature.properties.damageType;
          return L.circleMarker(latlng, {
            radius: 5,
            fillColor: getColorByType(type),
            color: "#333", // 테두리를 약간 진하게 주어 파스텔 톤이 지도에서 잘 보이게 함
            weight: 1.5,
            opacity: 1,
            fillOpacity: 0.9,
          });
        },
        onEachFeature: function (feature, layer) {
          const p = feature.properties;
          layer.bindPopup(`
            <div style="line-height: 1.4;">
              <b style="font-size: 1.1rem; color: #1e272e;">탐지 객체 정보</b><hr style="margin: 5px 0;">
              <b>분류:</b> <span style="color:${getColorByType(p.objectType)}; font-weight:bold; text-shadow: 0 0 1px #000;">${p.objectType || "N/A"}</span><br>
              <b>AI 확신도:</b> ${p.confidence ? (p.confidence * 100).toFixed(1) + "%" : "-"}<br>
            </div>
          `);
        },
      }).addTo(map);

      // 데이터 패치 함수
      function fetchMapData() {
        const bounds = map.getBounds();
        fetch(
          `/api/spatial/bbox?minLon=${bounds.getWest()}&minLat=${bounds.getSouth()}&maxLon=${bounds.getEast()}&maxLat=${bounds.getNorth()}`,
        )
          .then((res) => res.json())
          .then((geoJsonData) => {
            geojsonLayer.clearLayers();
            geojsonLayer.addData(geoJsonData);
            document.getElementById("status-counts").innerHTML =
              `화면 내 탐지 객체: <b>${geoJsonData.features ? geoJsonData.features.length : 0}</b>건`;
          })
          .catch((err) => console.error("데이터 로드 실패:", err));
      }
      map.on("moveend", fetchMapData);

      // 💡 개별 파일 업로드 로직
      let selectedImage = null;
      let selectedJson = null;

      // 이미지 선택 시 파일명 표시
      document.getElementById("image-input").addEventListener("change", (e) => {
        if (e.target.files[0]) {
          selectedImage = e.target.files[0];
          document.getElementById("label-image").innerText =
            `✅ 이미지: ${selectedImage.name.substring(0, 15)}...`;
          document.getElementById("label-image").style.background = "#fff";
        }
      });

      // JSON 선택 시 파일명 표시
      document.getElementById("json-input").addEventListener("change", (e) => {
        if (e.target.files[0]) {
          selectedJson = e.target.files[0];
          document.getElementById("label-json").innerText =
            `✅ 메타데이터: ${selectedJson.name.substring(0, 15)}...`;
          document.getElementById("label-json").style.background = "#fff";
        }
      });

      const readFileAsText = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = (e) => reject(e);
          reader.readAsText(file);
        });

      // 💡 분석 시작 버튼 클릭 이벤트
      document
        .getElementById("btn-submit")
        .addEventListener("click", async () => {
          if (!selectedImage || !selectedJson) {
            alert("이미지와 메타데이터(.json) 파일을 모두 선택해주세요!");
            return;
          }

          const statusDiv = document.getElementById("upload-status");
          statusDiv.innerHTML = `⏳ 파일 파싱 및 공간 좌표 변환 중...`;
          statusDiv.style.color = "#ffd32a";

          try {
            // 1. JSON 파일 파싱하여 물리적 범위 계산
            const jsonText = await readFileAsText(selectedJson);
            const metaData = JSON.parse(jsonText)[0];

            const [x_min, y_max] = metaData.coordinates
              .split(",")
              .map((s) => parseFloat(s.trim()));
            const res = metaData.img_resolution;
            const x_max = x_min + metaData.img_width * res;
            const y_min = y_max - metaData.img_height * res;

            // 2. Proj4js를 이용한 좌표계 변환 (EPSG:5186 ➔ EPSG:4326)
            const sw = proj4("EPSG:5186", "EPSG:4326", [x_min, y_min]);
            const ne = proj4("EPSG:5186", "EPSG:4326", [x_max, y_max]);

            const realBounds = {
              minLon: sw[0],
              minLat: sw[1],
              maxLon: ne[0],
              maxLat: ne[1],
            };

            // 3. 백엔드로 데이터 전송
            const formData = new FormData();
            formData.append("image", selectedImage);
            formData.append("minLon", realBounds.minLon);
            formData.append("minLat", realBounds.minLat);
            formData.append("maxLon", realBounds.maxLon);
            formData.append("maxLat", realBounds.maxLat);

            const response = await fetch("/api/images/upload", {
              method: "POST",
              body: formData,
            });
            const result = await response.json();

            if (result.success) {
              // 4. 지도 위에 투명하게 이미지 얹기
              const imageUrl = URL.createObjectURL(selectedImage);
              const imageBounds = [
                [realBounds.minLat, realBounds.minLon],
                [realBounds.maxLat, realBounds.maxLon],
              ];
              L.imageOverlay(imageUrl, imageBounds, { opacity: 0.85 }).addTo(
                map,
              );

              // 5. 계산된 진짜 좌표의 중심으로 비행(flyTo)
              const centerLat = (realBounds.minLat + realBounds.maxLat) / 2;
              const centerLon = (realBounds.minLon + realBounds.maxLon) / 2;
              map.flyTo([centerLat, centerLon], 16, {
                animate: true,
                duration: 2,
              });

              statusDiv.innerHTML = `✅ 좌표 기반 매핑 완료! ✈️<br>AI 백그라운드 분석 대기 중...`;
              statusDiv.style.color = "#0be881";

              // 6. 폴링으로 AI 분석 결과 확인
              let refreshCount = 0;
              const interval = setInterval(() => {
                fetchMapData();
                refreshCount++;
                if (refreshCount > 6) clearInterval(interval); // 12초간 대기 후 폴링 종료
              }, 2000);

              // 입력 폼 리셋
              selectedImage = null;
              selectedJson = null;
              document.getElementById("label-image").innerText =
                "1. 🖼️ 위성 이미지 선택 (.jpg)";
              document.getElementById("label-json").innerText =
                "2. 📄 메타데이터 선택 (.json)";
              document.getElementById("label-image").style.background =
                "#d2dae2";
              document.getElementById("label-json").style.background =
                "#d2dae2";
              document.getElementById("image-input").value = "";
              document.getElementById("json-input").value = "";
            } else {
              throw new Error(result.message || "서버 응답 오류");
            }
          } catch (err) {
            console.error(err);
            statusDiv.innerHTML = `❌ 오류 발생: ${err.message}`;
            statusDiv.style.color = "#ff3f34";
          }
        });
    </script>
  </body>
</html>
